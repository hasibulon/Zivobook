<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Z Letter Gradient -->
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- Checkmark Gradient -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Clean drop shadow -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
    </filter>
    
    <filter id="iconGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Smooth rounded base card -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer subtle circular ring indicating networking/connections -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="12 8" opacity="0.3" />
  <circle cx="256" cy="256" r="185" fill="none" stroke="#1e293b" stroke-width="3" opacity="0.5" />

  <!-- Main stylized bold geometric letter 'Z' -->
  <g filter="url(#glow)">
    <path d="M140 150 
             C140 135, 155 125, 175 125 
             L335 125 
             C355 125, 370 135, 370 150 
             C370 162, 362 172, 348 181
             L200 325 
             L335 325 
             C355 325, 370 335, 370 350
             C370 365, 355 375, 335 375
             L175 375
             C155 375, 140 365, 140 350
             C140 338, 148 328, 162 319
             L310 175
             L175 175
             C155 175, 140 165, 140 150 Z" 
          fill="url(#zGrad)" />
  </g>

  <!-- Glowing Premium Verification Badge/Checkmark (Symbol of trust/veritrust) -->
  <g transform="translate(310, 310)" filter="url(#glow)">
    <!-- Badge Background Circle -->
    <circle cx="60" cy="60" r="55" fill="#0f172a" stroke="#1e293b" stroke-width="4" />
    <!-- Gradient Fill Check Badge -->
    <path d="M 60 12 L 73 21 L 89 21 L 94 36 L 107 43 L 102 59 L 108 75 L 97 86 L 93 102 L 77 103 L 66 114 L 50 110 L 37 116 L 27 103 L 11 100 L 11 84 L 2 72 L 9 56 L 6 40 L 20 33 L 23 17 L 39 19 Z" 
          fill="url(#checkGrad)" />
    <!-- Inner Checkmark White Line -->
    <path d="M38 58 L52 72 L82 42" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="10" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
</svg>
